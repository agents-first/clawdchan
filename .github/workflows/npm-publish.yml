name: npm-publish

# Publishes the clawdchan npm package via npm Trusted Publishing (OIDC).
# No NPM_TOKEN needed — npmjs.com authenticates the workflow by its
# repo + filename + ref, configured under the package's Trusted Publishers.
#
# Flow:
#   1. goreleaser (release.yml) tags a build, creates a draft GitHub Release.
#   2. You review the draft and click "Publish release".
#   3. This workflow fires on release:published, pins npm/package.json to
#      the release tag, and publishes with provenance attestation.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.1.0)"
        required: true

permissions:
  contents: read
  id-token: write  # required by npm Trusted Publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: npm
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm to a version that supports Trusted Publishing
        run: npm install -g npm@latest

      - name: Pin package version to release tag
        env:
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          VERSION="${TAG#v}"
          echo "Setting npm version to $VERSION"
          npm version --no-git-tag-version --allow-same-version "$VERSION"

      - name: Sanity-check release assets are public
        env:
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          set -e
          URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/checksums.txt"
          echo "Probing $URL"
          curl -fsSLI "$URL" >/dev/null

      - name: Publish to npm (Trusted Publishing + provenance)
        run: npm publish --access public --provenance
